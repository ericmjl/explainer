schema_version: protein-visualization-v0.1
id: esmfold2_semantic_zoom_board
title: Biohub ESMFold2 Semantic Zoom Board
entry:
  architecture: architectures/biohub-esmfold2-diffusion-module.yaml
root_board: esmfold2_overview
boards:
  - id: esmfold2_overview
    title: Biohub ESMFold2
    summary: A one-block overview. Open the diffusion module to see the denoising architecture.
    scale_lanes: false
    grid:
      columns: 3
      rows: 3
    nodes:
      - id: diffusion_module
        kind: module
        label: DiffusionModule
        scale: abstract
        role: denoising module for structure prediction
        detail: conditioning -> atom encoder -> token transformer -> atom decoder
        col: 2
        row: 2
        expandable: true
  - id: diffusion_module
    title: ESMFold2 Diffusion Module
    summary: Conditioning, atom encoder, token transformer, and atom decoder.
    parent: esmfold2_overview
    grid:
      columns: 5
      rows: 4
    nodes:
      - id: diffusion_conditioning
        kind: module
        module_ref: diffusion_conditioning
        col: 1
        row: 2
        expandable: true
      - id: conditioning_single
        kind: representation
        rep_ref: conditioning_single
        col: 2
        row: 2
      - id: pair_repr
        kind: representation
        rep_ref: pair_repr
        col: 3
        row: 1
      - id: atom_features
        kind: representation
        rep_ref: atom_features
        col: 1
        row: 3
      - id: coordinates
        kind: representation
        label: coordinates
        scale: coordinate
        role: normalized noisy/current atom coordinates for q_l injection
        shape: "B x N_atom x 3"
        col: 1
        row: 4
      - id: atom_encoder
        kind: module
        module_ref: atom_encoder
        col: 2
        row: 3
        expandable: true
      - id: token_repr
        kind: representation
        rep_ref: token_repr
        col: 3
        row: 2
      - id: token_transformer
        kind: module
        module_ref: token_transformer
        col: 4
        row: 2
        expandable: true
      - id: atom_decoder
        kind: module
        module_ref: atom_decoder
        col: 5
        row: 3
        expandable: true
      - id: coordinate_update
        kind: representation
        rep_ref: coordinate_update
        col: 5
        row: 4
    edges:
      - from: diffusion_conditioning
        to: conditioning_single
        label: conditioned s
        tone: conditioning
        connection:
          title: Diffusion conditioning to single stream
          role: timestep-conditioned token features
          inside: Noise Fourier features and input single features are projected into s, then used to condition token diffusion.
      - from: diffusion_conditioning
        to: pair_repr
        label: conditioned z
        tone: conditioning
        connection:
          title: Diffusion conditioning to pair stream
          role: pair conditioning
          inside: z_trunk is combined with relative position encoding, projected, and cached as the pair representation z.
      - from: atom_features
        to: atom_encoder
        label: atom features
        connection:
          title: Atom features into atom encoder
          role: atom latent state
          inside: Used as the atom state x. The local atom attention stack forms Q/K/V from this representation.
      - from: coordinates
        to: atom_encoder
        label: coords
        connection:
          title: Coordinates into atom encoder
          role: coordinate-conditioned atom state
          inside: Current noisy coordinates are normalized and projected into q_l; reference coordinates also build the 3D RoPE attention parameters. Neither path is pair bias.
      - from: conditioning_single
        to: token_transformer
        label: conditioned s
        tone: conditioning
        connection:
          title: Conditioned single stream into token transformer
          role: AdaLN / token conditioning
          inside: The conditioned single stream s is added into the token state and also passed into the token transformer conditioning path.
      - from: atom_encoder
        to: token_repr
        label: token readout
        connection:
          title: Atom encoder to token representation
          role: atom-to-token handoff
          inside: The atom-level state is read out into token-scale state before the token diffusion transformer.
      - from: token_repr
        to: token_transformer
        label: token state
        connection:
          title: Token state into diffusion transformer
          role: token self-attention input
          inside: Used as the token stream for full token self-attention, where Q/K/V come from token representation.
      - from: pair_repr
        to: token_transformer
        label: pair bias z
        tone: conditioning
        connection:
          title: Pair representation into token transformer
          role: attention-logit bias
          inside: pair_norm(z) is projected by pair_bias_proj and added to token attention logits before softmax.
      - from: token_transformer
        to: atom_decoder
        label: token output
        connection:
          title: Token transformer into atom decoder
          role: token-to-atom readout
          inside: The token output a_i is projected to atom features and gathered back onto atoms inside the decoder.
      - from: atom_encoder
        to: atom_decoder
        label: atom skips
        tone: skip
        connection:
          title: Atom encoder skips into atom decoder
          role: atom-local skip state
          inside: The decoder reuses q_skip, c_skip, and p_skip from the atom encoder so token output can be decoded back in the same atom-local frame.
      - from: atom_decoder
        to: coordinate_update
        label: r update
        connection:
          title: Atom decoder coordinate update
          role: coordinate update
          inside: The decoder normalizes atom features and projects them through output_linear to produce r_update.
  - id: diffusion_conditioning
    title: DiffusionConditioning
    summary: Build conditioned single/token state s and pair state z before denoising. ESMC has already entered upstream through z_trunk.
    parent: diffusion_module
    grid:
      columns: 5
      rows: 4
    nodes:
      - id: s_inputs
        kind: representation
        label: s_inputs
        scale: token
        role: raw single conditioning inputs
        shape: "B x N_token x c_s_inputs"
        col: 1
        row: 2
      - id: t_hat
        kind: representation
        label: t_hat
        scale: scalar
        role: diffusion noise timestep
        shape: "B"
        col: 1
        row: 3
      - id: z_trunk
        kind: representation
        label: z_trunk + relative position
        scale: token_pair
        role: ESMC-influenced trunk pair features plus relative-position encoding
        shape: "B x N_token x N_token x d_pair"
        col: 1
        row: 1
      - id: esmc_pair_path
        kind: representation
        label: ESMC -> lm_z -> trunk
        scale: token_pair
        role: upstream language-model pair path, not an atom-level input
        shape: "B x N_token x N_token x d_pair"
        col: 1
        row: 4
      - id: s_conditioning
        kind: operation
        label: s conditioning
        scale: token
        role: project s_inputs, add Fourier noise embedding, apply transition blocks
        col: 3
        row: 2
      - id: z_conditioning
        kind: operation
        label: z conditioning
        scale: token_pair
        role: combine z_trunk with relative position and cache across diffusion steps
        col: 3
        row: 1
      - id: conditioning_single
        kind: representation
        rep_ref: conditioning_single
        col: 5
        row: 2
      - id: pair_repr
        kind: representation
        rep_ref: pair_repr
        col: 5
        row: 1
    edges:
      - from: s_inputs
        to: s_conditioning
        label: single inputs
        connection:
          title: s inputs into conditioning
          role: single stream input
          inside: s_inputs are normalized, projected to c_s, and passed through transition blocks.
      - from: t_hat
        to: s_conditioning
        label: noise embedding
        tone: conditioning
        connection:
          title: timestep into single conditioning
          role: Fourier noise embedding
          inside: t_hat is converted to a Fourier noise embedding and added to the projected single stream.
      - from: z_trunk
        to: z_conditioning
        label: pair inputs
        tone: conditioning
        connection:
          title: z trunk into pair conditioning
          role: pair stream input
          inside: z_trunk, which already includes the ESMC-derived pair path through the recurrent trunk, is concatenated with relative position encoding, normalized, projected, and cached.
      - from: esmc_pair_path
        to: z_trunk
        label: upstream pair context
        tone: conditioning
        connection:
          title: ESMC path stops at pair trunk
          role: language-model pair context
          inside: ESMC hidden states are projected to lm_z and integrated through the recurrent pair trunk before the diffusion module; they are not passed directly into the atom encoder.
      - from: s_conditioning
        to: conditioning_single
        label: conditioned s
        tone: conditioning
        connection:
          title: conditioned s output
          role: token conditioning
          inside: This s stream conditions the token transformer and is added into the token representation.
      - from: z_conditioning
        to: pair_repr
        label: conditioned z
        tone: conditioning
        connection:
          title: conditioned z output
          role: pair conditioning
          inside: This z stream supplies pair bias to token attention.
  - id: atom_encoder
    title: ESMFold2AtomEncoder
    summary: Build static c_l and mutable q_l atom streams, run local atom attention, then mean-pool atoms into tokens.
    parent: diffusion_module
    grid:
      columns: 5
      rows: 5
    nodes:
      - id: atom_features
        kind: representation
        rep_ref: atom_features
        col: 1
        row: 3
      - id: coordinates
        kind: representation
        label: r_noisy
        scale: coordinate
        role: normalized noisy atom coordinates injected into q_l
        shape: "B x N_atom x 3"
        col: 1
        row: 4
      - id: atom_embed
        kind: operation
        label: atom feature embed
        scale: atom
        role: project reference atom features into c_base
        col: 2
        row: 3
      - id: atom_conditioning
        kind: representation
        rep_ref: atom_conditioning
        col: 2
        row: 2
      - id: atom_query_state
        kind: representation
        rep_ref: atom_query_state
        col: 2
        row: 4
      - id: atom_adaln
        kind: operation
        label: per-atom AdaLN
        scale: atom
        role: c_l produces shift/scale/gates for q_l attention and FFN updates
        col: 3
        row: 2
      - id: swa_atom_transformer
        kind: module
        label: SWAAtomTransformer
        scale: atom
        role: local atom attention over q_l with 3D RoPE and c_l modulation
        detail: "3 blocks / 4 heads / 128 window"
        col: 3
        row: 3
      - id: atom_to_token
        kind: operation
        label: linear + mean pool
        scale: token
        role: project atom state to token width and mean-pool by atom_to_token
        col: 4
        row: 2
      - id: token_repr
        kind: representation
        rep_ref: token_repr
        col: 5
        row: 2
      - id: atom_skips
        kind: representation
        label: q/c/p skips
        scale: atom
        role: atom-local skip state reused by atom decoder
        shape: "q_skip, c_skip, p_skip"
        col: 5
        row: 4
    edges:
      - from: atom_features
        to: atom_embed
        label: atom features
        connection:
          title: atom features into embedder
          role: atom feature basis
          inside: ref_pos, charge, mask, element one-hot, and atom-name character one-hots are concatenated and projected to c_base.
      - from: coordinates
        to: atom_query_state
        label: noisy coords
        connection:
          title: noisy coordinates into q_l
          role: coordinate-conditioned q
          inside: r_noisy is concatenated with pred_r1; pred_r1 defaults to zeros in this path, and coords_linear injects the result into q_l.
      - from: atom_embed
        to: atom_conditioning
        label: c_l
        tone: conditioning
        connection:
          title: static atom conditioning
          role: AdaLN source
          inside: c_l is the static atom conditioning stream reused by every atom block.
      - from: atom_embed
        to: atom_query_state
        label: q_l base
        connection:
          title: mutable atom state base
          role: q_l initialization
          inside: q_l starts from c_base before the coordinate projection is added.
      - from: atom_conditioning
        to: atom_adaln
        label: shift/scale/gates
        tone: conditioning
        connection:
          title: c_l to per-atom AdaLN
          role: atom-wise modulation
          inside: c_l is passed through adaln_modulation to produce attention and FFN shift, scale, and gate vectors for each atom.
      - from: atom_adaln
        to: swa_atom_transformer
        label: modulation
        tone: conditioning
        connection:
          title: AdaLN inside atom block
          role: atom block modulation
          inside: The generated shifts, scales, and gates modulate q_l before attention and FFN updates.
      - from: atom_query_state
        to: swa_atom_transformer
        label: q_l + 3D RoPE
        connection:
          title: q_l into local transformer
          role: mutable atom state
          inside: q_l and attention_params enter SWAAtomTransformer; z_ij and s_i are not passed into the atom block.
      - from: swa_atom_transformer
        to: atom_to_token
        label: atom state
        connection:
          title: atom transformer output
          role: atom-to-token source
          inside: Atom outputs are linearly projected to token width and ReLUed before scatter_atom_to_token.
      - from: atom_to_token
        to: token_repr
        label: token readout
        connection:
          title: token representation output
          role: token-scale handoff
          inside: scatter_atom_to_token uses scatter_reduce with reduce=mean, so atoms assigned to the same token/residue are averaged.
      - from: swa_atom_transformer
        to: atom_skips
        label: skips
        tone: skip
        connection:
          title: encoder skip outputs
          role: decoder skip inputs
          inside: q, c, and attention parameters are returned for reuse in the atom decoder.
  - id: token_transformer
    title: DiffusionTransformer
    summary: Twelve full token self-attention blocks; s gives token-wise adaptive normalization and z gives fixed pair bias.
    parent: diffusion_module
    grid:
      columns: 5
      rows: 5
    nodes:
      - id: token_repr
        kind: representation
        rep_ref: token_repr
        col: 1
        row: 2
      - id: conditioning_single
        kind: representation
        rep_ref: conditioning_single
        col: 1
        row: 3
      - id: pair_repr
        kind: representation
        rep_ref: pair_repr
        col: 1
        row: 1
      - id: transformer_blocks
        kind: module
        label: DiffusionTransformer blocks
        scale: token
        role: repeated token transformer stack
        detail: "12 blocks / 16 heads"
        col: 3
        row: 2
      - id: token_adaln
        kind: operation
        label: token-wise AdaLN
        scale: token
        role: s_i gates and shifts each token state before attention and transition updates
        col: 2
        row: 3
      - id: pair_biased_attention
        kind: module
        label: Pair-biased attention
        scale: token_pair
        role: add projected z to token attention logits
        detail: "fixed z, learned per-block projection"
        col: 3
        row: 1
      - id: conditioned_transition
        kind: operation
        label: conditioned transition
        scale: token
        role: conditioned SwiGLU/transition update
        col: 3
        row: 3
      - id: updated_token_repr
        kind: representation
        label: updated token_repr
        scale: token
        role: token representation after diffusion transformer
        shape: "B x N_token x d_token"
        col: 5
        row: 2
    edges:
      - from: token_repr
        to: transformer_blocks
        label: token state
        connection:
          title: token state into transformer
          role: Q/K/V source
          inside: The token stream supplies the attention projections.
      - from: conditioning_single
        to: token_adaln
        label: conditioned s
        tone: conditioning
        connection:
          title: s into token transformer
          role: token-wise AdaLN conditioning
          inside: Each s_i produces token-specific adaptive normalization gates and shifts; it is not only a global timestep vector.
      - from: token_adaln
        to: transformer_blocks
        label: modulated token state
        tone: conditioning
        connection:
          title: token-wise modulation inside blocks
          role: attention and transition conditioning
          inside: Attention and transition sub-blocks receive a token state modulated by the matching s_i.
      - from: pair_repr
        to: pair_biased_attention
        label: pair bias z
        tone: conditioning
        connection:
          title: z into pair-biased attention
          role: attention-logit bias
          inside: The same z is kept fixed through the token stack, but each attention block has learned pair_norm and pair_bias_proj parameters to project it to per-head logits.
      - from: pair_biased_attention
        to: transformer_blocks
        label: attention update
        tone: conditioning
        connection:
          title: pair-biased attention inside transformer
          role: attention sub-block
          inside: The pair-biased attention update is one sub-block inside the repeated token transformer.
      - from: conditioned_transition
        to: transformer_blocks
        label: transition update
        connection:
          title: transition inside transformer
          role: token transition sub-block
          inside: Conditioned transition blocks refine the token representation after attention.
      - from: transformer_blocks
        to: updated_token_repr
        label: updated token
        connection:
          title: token transformer output
          role: token output to atom decoder
          inside: The updated token representation is normalized and passed to the atom decoder.
  - id: atom_decoder
    title: ESMFold2AtomDecoder
    summary: Decode updated token state back to atom-coordinate updates.
    parent: diffusion_module
    grid:
      columns: 5
      rows: 4
    nodes:
      - id: updated_token_repr
        kind: representation
        label: updated token_repr
        scale: token
        role: token output from diffusion transformer
        shape: "B x N_token x d_token"
        col: 1
        row: 2
      - id: atom_skips
        kind: representation
        label: q/c/p skips
        scale: atom
        role: atom-local skip state from atom encoder
        shape: "q_skip, c_skip, p_skip"
        col: 1
        row: 4
      - id: token_to_atom
        kind: operation
        label: token-to-atom gather
        scale: atom
        role: project token output and gather it onto atom positions
        col: 2
        row: 3
      - id: decoder_swa
        kind: module
        label: SWAAtomTransformer
        scale: atom
        role: local atom decoder attention with reused atom frame
        detail: "3 blocks / 4 heads / 128 window"
        col: 3
        row: 3
      - id: output_linear
        kind: operation
        label: norm + output_linear
        scale: coordinate
        role: predict atom-coordinate update
        col: 4
        row: 4
      - id: coordinate_update
        kind: representation
        rep_ref: coordinate_update
        col: 5
        row: 4
    edges:
      - from: updated_token_repr
        to: token_to_atom
        label: token output
        connection:
          title: token output into atom decoder
          role: token-to-atom source
          inside: token_to_atom_linear projects token state into atom-channel features.
      - from: atom_skips
        to: token_to_atom
        label: q skip
        tone: skip
        connection:
          title: atom encoder skips into decoder
          role: atom-local frame reuse
          inside: q_l, c_l, and p_lm from the encoder are reused to preserve atom-local context.
      - from: token_to_atom
        to: decoder_swa
        label: q_l + token
        connection:
          title: gathered token state into decoder attention
          role: atom query update
          inside: gather_token_to_atom copies each token vector to every atom with the matching atom_to_token index; the copied vector is added to atom-specific q_l before local atom attention.
      - from: decoder_swa
        to: output_linear
        label: decoded atom state
        connection:
          title: decoder atom state to coordinates
          role: coordinate head input
          inside: The decoder normalizes atom state and applies output_linear.
      - from: output_linear
        to: coordinate_update
        label: r_update
        connection:
          title: coordinate update output
          role: denoising update
          inside: r_update is combined with x_noisy to compute the denoised output coordinates.
