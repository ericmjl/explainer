schema_version: standard-block-v0.2
id: pair_biased_attention
name: Pair-Biased Attention
kind: attention
status: review
description: Form a single/token attention update with self-attention whose logits are conditioned by a pair representation, optionally adding attention-weighted pair-value aggregation.
ports:
  - id: single_state
    label: single state
    direction: input
    kind: representation
    required: true
    cardinality: one
    relation_kinds: [data_flow, state_update]
    glyph: single
    notation: s
    role: state used to form queries, keys, and scalar values
  - id: pair_context
    label: pair context
    direction: conditioning
    kind: representation
    required: true
    cardinality: one
    relation_kinds: [conditioning, data_flow]
    glyph: pair
    notation: z
    role: read-only pair representation used for logit bias and optional attention-weighted pair-value aggregation
  - id: attention_mask
    label: attention mask
    direction: conditioning
    kind: mask
    required: false
    cardinality: one
    relation_kinds: [conditioning, control]
    glyph: vector
    notation: m
    role: optional validity mask applied before softmax and after a reduced wrapper
  - id: updated_single_state
    label: updated single state
    direction: output
    kind: representation
    required: false
    cardinality: one
    relation_kinds: [data_flow, state_update]
    glyph: single
    notation: s'
    role: attention-updated single/token stream for variants that include the residual boundary
  - id: attention_delta
    label: attention delta
    direction: output
    kind: representation
    required: false
    cardinality: one
    relation_kinds: [data_flow, state_update]
    glyph: single
    notation: Δs
    role: projected attention update before any architecture-owned residual wrapper
variants:
  - id: logit_bias_only
    label: Pair-logit bias
    description: Standard self-attention with a projected pair term added to logits; pair features are not aggregated as values.
    step_refs:
      - steps.project_qkv
      - steps.scalar_logits
      - steps.project_pair_bias
      - steps.combine_logits
      - steps.softmax_attention_unmasked
      - steps.aggregate_scalar_values
      - steps.project_attention_output
  - id: pair_values_attention_delta
    label: Reduced pair attention delta
    description: A reduced IPA-style path adds pair bias and attention-weighted pair-value aggregation, then projects the concatenated contexts into an attention delta.
    step_refs:
      - steps.project_qkv
      - steps.scalar_logits
      - steps.project_pair_bias
      - steps.combine_logits
      - steps.apply_attention_mask
      - steps.softmax_attention_masked
      - steps.aggregate_scalar_values
      - steps.aggregate_pair_values
      - steps.project_reduced_output
default_variant: logit_bias_only
values:
  - id: queries
    label: queries
    kind: representation
    glyph: single
    notation: Q
  - id: keys
    label: keys
    kind: representation
    glyph: single
    notation: K
  - id: scalar_values
    label: scalar values
    kind: representation
    glyph: single
    notation: V
  - id: scalar_logits
    label: query-key logits
    kind: logit
    glyph: pair
    notation: l_qk
  - id: pair_bias
    label: projected pair bias
    kind: logit
    glyph: pair
    notation: b_z
  - id: biased_logits
    label: conditioned logits
    kind: logit
    glyph: pair
    notation: l
  - id: masked_logits
    label: masked logits
    kind: logit
    glyph: pair
    notation: l_m
  - id: attention_weights
    label: attention weights
    kind: weight
    glyph: pair
    notation: a
  - id: scalar_context
    label: scalar context
    kind: representation
    glyph: single
    notation: o_s
  - id: pair_value_context
    label: pair-value context
    kind: representation
    glyph: single
    notation: o_z
steps:
  - id: project_qkv
    label: Project Q, K, and V
    operation: qkv_projection
    inputs: [ports.single_state]
    outputs: [values.queries, values.keys, values.scalar_values]
    code: "q, k, v = project_qkv(single_state)"
    tex: "q_i, k_i, v_i = W_{qkv}s_i"
    role: form self-attention terms from the same single-state input
  - id: scalar_logits
    label: Form query-key logits
    operation: attention_logits
    inputs: [values.queries, values.keys]
    outputs: [values.scalar_logits]
    code: "scalar_logits = einsum(q, k) * scale"
    tex: "ell^{qk}_{ijh} = <q_{ih}, k_{jh}> s_h"
  - id: project_pair_bias
    label: Project pair bias
    operation: pair_bias_projection
    inputs: [ports.pair_context]
    outputs: [values.pair_bias]
    code: "pair_bias = project_pair(pair_context)"
    tex: "b_{ijh} = W_h z_{ij}"
    role: the selected architecture variant owns any pair preprocessing before projection
  - id: combine_logits
    label: Add pair bias
    operation: pair_bias_add
    inputs: [values.scalar_logits, values.pair_bias]
    outputs: [values.biased_logits]
    code: "biased_logits = scalar_logits + pair_bias"
    tex: "ell_{ijh} = ell^{qk}_{ijh} + b_{ijh}"
  - id: apply_attention_mask
    label: Apply attention mask
    operation: attention_mask
    inputs: [values.biased_logits, ports.attention_mask]
    outputs: [values.masked_logits]
    code: "masked_logits = biased_logits + mask_bias(attention_mask)"
    tex: "ell^m_{ijh} = ell_{ijh} + m_{ij}"
  - id: softmax_attention_unmasked
    label: Normalize attention
    operation: softmax
    inputs: [values.biased_logits]
    outputs: [values.attention_weights]
    code: "attention = softmax(biased_logits, dim=keys)"
    tex: "a_{ijh} = softmax_j(ell_{ijh})"
  - id: softmax_attention_masked
    label: Normalize masked attention
    operation: softmax
    inputs: [values.masked_logits]
    outputs: [values.attention_weights]
    code: "attention = softmax(masked_logits, dim=keys)"
    tex: "a_{ijh} = softmax_j(ell^m_{ijh})"
  - id: aggregate_scalar_values
    label: Aggregate scalar values
    operation: weighted_sum
    inputs: [values.attention_weights, values.scalar_values]
    outputs: [values.scalar_context]
    code: "scalar_context = einsum(attention, v)"
    tex: "o^s_{ih} = sum_j a_{ijh} v_{jh}"
  - id: aggregate_pair_values
    label: Attention-weighted pair-value aggregation
    operation: pair_value_aggregation
    inputs: [values.attention_weights, ports.pair_context]
    outputs: [values.pair_value_context]
    code: "pair_context_out = einsum(attention, pair_context)"
    tex: "o^z_{ih} = sum_j a_{ijh} z_{ij}"
  - id: project_attention_output
    label: Project attention output
    operation: output_projection
    inputs: [values.scalar_context]
    outputs: [ports.updated_single_state]
    code: "updated_single_state = output_projection(scalar_context)"
  - id: project_reduced_output
    label: Fuse scalar and pair contexts
    operation: output_projection
    inputs: [values.scalar_context, values.pair_value_context]
    outputs: [ports.attention_delta]
    code: "attention_delta = output_projection(concat(scalar_context, pair_context_out))"
visual_template:
  grid:
    columns: 13
    rows: 7
    column_sizing: content
    row_sizing: content
    col_gap: 22
    row_gap: 34
  nodes:
    - { id: single_state, ref: ports.single_state, col: 1, row: 2, prominence: secondary, treatment: compact }
    - { id: pair_context, ref: ports.pair_context, col: 1, row: 5, prominence: secondary, treatment: compact }
    - { id: attention_mask, ref: ports.attention_mask, col: 5, row: 6, prominence: context, treatment: chip }
    - { id: updated_single_state, ref: ports.updated_single_state, col: 13, row: 3, prominence: secondary, treatment: compact }
    - { id: attention_delta, ref: ports.attention_delta, col: 13, row: 4, prominence: secondary, treatment: compact }
    - { id: project_qkv, ref: steps.project_qkv, col: 2, row: 2, prominence: primary, treatment: compact }
    - { id: queries, ref: values.queries, col: 3, row: 1, prominence: context, treatment: chip }
    - { id: keys, ref: values.keys, col: 3, row: 2, prominence: context, treatment: chip }
    - { id: scalar_values, ref: values.scalar_values, col: 3, row: 4, prominence: context, treatment: chip }
    - { id: scalar_logits_step, ref: steps.scalar_logits, col: 4, row: 2, prominence: primary, treatment: compact }
    - { id: scalar_logits, ref: values.scalar_logits, col: 5, row: 2, prominence: context, treatment: compact }
    - { id: project_pair_bias, ref: steps.project_pair_bias, col: 3, row: 5, prominence: primary, treatment: compact }
    - { id: pair_bias, ref: values.pair_bias, col: 5, row: 5, prominence: context, treatment: compact }
    - { id: combine_logits, ref: steps.combine_logits, col: 6, row: 3, prominence: primary, treatment: compact }
    - { id: biased_logits, ref: values.biased_logits, col: 7, row: 3, prominence: context, treatment: compact }
    - { id: apply_attention_mask, ref: steps.apply_attention_mask, col: 6, row: 6, prominence: secondary, treatment: compact }
    - { id: masked_logits, ref: values.masked_logits, col: 7, row: 6, prominence: context, treatment: compact }
    - { id: softmax_attention_unmasked, ref: steps.softmax_attention_unmasked, col: 8, row: 3, prominence: primary, treatment: compact }
    - { id: softmax_attention_masked, ref: steps.softmax_attention_masked, col: 8, row: 6, prominence: primary, treatment: compact }
    - { id: attention_weights, ref: values.attention_weights, col: 9, row: 4, prominence: context, treatment: compact }
    - { id: aggregate_scalar_values, ref: steps.aggregate_scalar_values, col: 10, row: 3, prominence: primary, treatment: compact }
    - { id: scalar_context, ref: values.scalar_context, col: 11, row: 3, prominence: context, treatment: compact }
    - { id: aggregate_pair_values, ref: steps.aggregate_pair_values, col: 10, row: 5, prominence: primary, treatment: compact }
    - { id: pair_value_context, ref: values.pair_value_context, col: 11, row: 5, prominence: context, treatment: compact }
    - { id: project_attention_output, ref: steps.project_attention_output, col: 12, row: 3, prominence: primary, treatment: compact }
    - { id: project_reduced_output, ref: steps.project_reduced_output, col: 12, row: 4, prominence: primary, treatment: compact }
  segments:
    - id: attention_weights
      label: Compute attention weights
      description: Project Q/K/V from the single stream, add the pair-derived logit bias, apply the validity mask when present, and normalize over keys.
      node_refs:
        - ports.single_state
        - ports.pair_context
        - ports.attention_mask
        - steps.project_qkv
        - values.queries
        - values.keys
        - steps.scalar_logits
        - values.scalar_logits
        - steps.project_pair_bias
        - values.pair_bias
        - steps.combine_logits
        - values.biased_logits
        - steps.apply_attention_mask
        - values.masked_logits
        - steps.softmax_attention_unmasked
        - steps.softmax_attention_masked
        - values.attention_weights
    - id: value_aggregation
      label: Aggregate values
      description: Reuse the same attention weights to aggregate ordinary scalar values and, in the reduced IPA-style variant, attention-weighted pair values.
      node_refs:
        - values.scalar_values
        - steps.aggregate_scalar_values
        - values.scalar_context
        - steps.aggregate_pair_values
        - values.pair_value_context
        - steps.project_attention_output
        - steps.project_reduced_output
        - ports.updated_single_state
        - ports.attention_delta
evidence_policy:
  generic_definition: The template is reusable attention-core vocabulary; residual addition, dropout, normalization, transition, and masking belong to the surrounding architecture unless a variant explicitly includes that boundary.
  usage_requires:
    - Evidence for the pair projection and addition to attention logits.
    - Evidence for attention-weighted pair-value aggregation when the reduced variant is selected.
