<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Architecture Renderer</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body class="renderer-page">
    <main class="renderer-shell">
      <header class="renderer-header">
        <div>
          <p class="eyebrow" id="rendererEyebrow">Interactive architecture</p>
          <h1 id="archTitle">Architecture</h1>
          <p id="rendererIntro">
            Open a part of the system to move from the overview into its
            internal mechanism. The location guide keeps each level connected
            to the whole.
          </p>
        </div>
        <nav class="note-nav" aria-label="Renderer navigation">
          <select id="archSwitcher" class="arch-switcher" aria-label="Choose architecture"></select>
          <a class="story-home-link" href="../../">All pages</a>
          <a class="story-home-link" id="archSourceLink" href="#">Source YAML</a>
        </nav>
      </header>

      <section class="renderer-grid">
        <section class="architecture-canvas" aria-label="Architecture map">
          <div id="scaleLaneLayer" class="scale-lane-layer" aria-hidden="true" hidden></div>

          <div id="moduleLayer" class="module-layer"></div>
          <svg id="edgeLayer" class="edge-layer" aria-label="Architecture connections"></svg>
        </section>

        <aside class="focus-panel" aria-label="Architecture details">
          <div class="focus-panel-header" id="focusHeader">
            <div>
              <p class="eyebrow" id="focusEyebrow">Current takeaway</p>
              <h2 id="focusTitle">Architecture overview</h2>
            </div>
            <button id="focusReset" class="focus-reset" type="button" hidden>Close</button>
          </div>
          <div id="focusBody" class="focus-body"></div>

          <div class="focus-panel-header focus-preview-header" id="focusPreviewHeader" hidden>
            <p class="eyebrow">Preview · select to keep</p>
            <h2 id="focusPreviewTitle">Preview</h2>
          </div>
          <div id="focusPreviewBody" class="focus-body focus-preview-body" hidden></div>
        </aside>
      </section>
    </main>

    <script>
      window.MathJax = {
        tex: { inlineMath: [["\\(", "\\)"]] },
        startup: {
          typeset: false,
          ready: () => {
            MathJax.startup.defaultReady();
            window.dispatchEvent(new Event("mathjax-ready"));
          },
        },
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script>
      if (new URLSearchParams(window.location.search).get("layout") === "elk") {
        const elkScript = document.createElement("script");
        elkScript.src = "https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js";
        elkScript.defer = true;
        elkScript.onload = () => window.dispatchEvent(new Event("elk-ready"));
        document.head.appendChild(elkScript);
      }
    </script>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
