        locator: pairformer_stack input
    code_bindings:
      - lexeme: z_i
        symbol_ref: block_pair
        access: write
      - lexeme: z
        symbol_ref: stack_pair_input
        access: read
  - id: initialize_single_state
    text: "s_i = s"
    scope_ref: scopes.stack
    statement_ref: relations.input_single_state_initializes_block_single_state
    operation: initialize_single_state
    inputs: [stack_single_input]
    outputs: [block_single]
    architecture_refs: []
