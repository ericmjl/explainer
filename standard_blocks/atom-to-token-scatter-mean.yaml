schema_version: protein-standard-block-v0.1
id: atom_to_token_scatter_mean
name: Atom-To-Token Scatter Mean
kind: scale_transition
status: draft
description: Project atom features to token width and average atoms assigned to the same token index.
canonical_operation: atom_to_token_scatter_mean
input_slots:
  - id: atom_state
    label: atom state
    scale: atom
    kind: representation
    required: true
  - id: atom_to_token_index
    label: atom_to_token
    scale: atom_to_token
    kind: index
    required: true
output_slots:
  - id: token_state
    label: token state
    scale: token
    kind: representation
math:
  - id: project_atom_state
    text: "h_atom = Linear(atom_state)"
    tex: "h_i^{atom} = W\\,a_i"
    operation: projection
    inputs: [atom_state]
    outputs: [token_state]
  - id: scatter_mean
    text: "token_j = mean({h_atom_i | atom_to_token_i = j})"
    tex: "t_j = \\frac{1}{|A_j|}\\sum_{i \\in A_j} h_i^{atom},\\quad A_j = \\{i:\\operatorname{tok}(i)=j\\}"
    operation: scatter_mean
    inputs: [atom_state, atom_to_token_index]
    outputs: [token_state]
visual_template:
  type: many_atoms_to_one_token
renderer_contract:
  shows:
    - many-to-one pooling
    - index map grouping
evidence_policy:
  require_usage_evidence: true
