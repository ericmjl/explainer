claims:
  - id: atom_encoder_accepts_but_does_not_use_z
    statement: z_ij and s_i are accepted by the atom encoder signature but are not passed into the atom transformer call.
    line_refs: [atom_encoder_signature, atom_transformer_call]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "758-770,836-840"
  - id: atom_attention_no_pair_bias
    statement: The atom attention implementation takes x and attention_params, applies 3D RoPE/window attention, and has no pair-bias input.
    line_refs: [swa_attention_forward]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "492-557"
  - id: token_attention_pair_biased
    statement: Pair bias is projected from z and added to token attention logits.
    line_refs: [token_transformer_constructed, token_pair_bias_add]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "939-940,1114-1118,1426-1432"
  - id: atom_conditioning_is_per_atom_adaln
    statement: The atom transformer uses c_l as per-atom conditioning for AdaLN-style shifts, scales, and gates on q_l.
    line_refs: [build_atom_conditioning, inject_noisy_coords, atom_adaln_modulation]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "603-605,619-630,786-839"
  - id: atom_to_token_is_mean_pool
    statement: Atom-to-token handoff projects each atom state to token width, then mean-pools atoms sharing the same atom_to_token index.
    line_refs: [atom_to_token_mean_pool]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "180-208,848-856"
  - id: esmc_enters_pair_not_atom
    statement: ESMC hidden states are projected to pair features and integrated into z_trunk; they are not direct atom-transformer inputs.
    line_refs: [esmc_to_pair_path, atom_encoder_signature]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "2073-2108"
        - kind: code
          source: esmfold2_model
          lines: "919-929,971-1000"
  - id: token_transformer_fixed_z
    statement: The token transformer updates token state but does not update z; each block uses z as fixed pair conditioning through learned pair-bias projections.
    line_refs: [token_pair_bias_add, token_blocks_do_not_update_z]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: esmfold2_common
          lines: "971-973,1203-1225,1241-1255"
