lines:
  - id: run_pairformer
    text: "s_trunk, z_trunk = PairformerStack(s, z, token_mask, pair_mask)"
    comment: The component boundary starts after AF3 has already embedded the token and pair inputs.
    scope_ref: scopes.pairformer
    statement_ref: modules.pairformer_stack
    callee_scope_ref: scopes.stack
    operation: run_pairformer_stack
    inputs: [input_single, input_pair, input_token_mask, input_pair_mask]
    outputs: [output_single, output_pair]
    architecture_refs:
      - claims.pairformer_has_no_msa_state
    source_refs:
      - source: evoformer_code
        locator: pairformer_stack application
    code_bindings:
      - lexeme: s_trunk
        symbol_ref: output_single
        access: write
      - lexeme: z_trunk
        symbol_ref: output_pair
        access: write
      - lexeme: PairformerStack
        architecture_ref: modules.pairformer_stack
        access: call
      - lexeme: s
        symbol_ref: input_single
        access: read
      - lexeme: z
        symbol_ref: input_pair
        access: read
      - lexeme: token_mask
        symbol_ref: input_token_mask
        access: read
      - lexeme: pair_mask
        symbol_ref: input_pair_mask
        access: read
  - id: initialize_pair_state
    text: "z_i = z"
    scope_ref: scopes.stack
    statement_ref: relations.input_pair_state_initializes_block_pair_state
    operation: initialize_pair_state
    inputs: [stack_pair_input]
    outputs: [block_pair]
    architecture_refs: []
    source_refs:
