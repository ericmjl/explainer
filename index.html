<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Architecture Explainers</title>
    <script src="./theme-init.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-page directory-page">
    <main class="landing-shell directory-shell">
      <header class="directory-header">
        <div>
          <p class="eyebrow">Interactive model maps</p>
          <h1>Architecture explainers</h1>
          <p>Select a model to explore its architecture.</p>
        </div>
        <label class="theme-switcher-label" for="directoryThemeSwitcher">
          <span>Appearance</span>
          <select id="directoryThemeSwitcher" class="theme-switcher"></select>
        </label>
      </header>

      <ul id="architectureList" class="architecture-list" aria-live="polite">
        <li class="directory-loading">Loading available architectures…</li>
      </ul>
      <p id="directoryEmpty" class="directory-empty" hidden>
        No model architectures are included in this build.
      </p>

      <noscript>
        <p class="directory-error">
          JavaScript is required to list the available architecture explainers.
        </p>
      </noscript>
    </main>
    <script type="module" src="./landing.js"></script>
  </body>
</html>
