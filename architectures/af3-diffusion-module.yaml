schema_version: protein-architecture-v0.1
id: af3_diffusion_module
name: AlphaFold 3 Diffusion Module
family: alphafold
status: partial
task_modes:
  - structure_prediction
  - diffusion_sampling
sources:
  - kind: local_story_note
    path: stories/af3-diffusion-module/story.md
    note: Coarse module counts and scale split recorded from current explainer discussion.
representations:
  - id: atom_features
    scale: atom
    semantic_role: atom latent state
    shape: "B x N_atom x d_atom"
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
  - id: token_repr
    scale: token
    semantic_role: token-level diffusion representation
    shape: "B x N_token x d_token"
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
modules:
  - id: atom_attention_encoder
    label: AtomAttentionEncoder
    kind: attention_stack
    role: lift atom-local context toward token context
    scale: atom
    repeats: 3
    story_ref: stories/af3-local-atom-attention/
    depth:
      blocks: 3
      heads: 4
    contains:
      - id: local_atom_attention
        label: Local atom attention
        story_ref: stories/af3-local-atom-attention/
    inputs:
      - atom_features
    outputs:
      - token_repr
    attention:
      pattern: sequence_local
      query_scale: atom
      key_value_scale: atom
      query_subset_size: 32
      key_value_subset_size: 128
      window:
        kind: contiguous_sequence
        size: 128
      pair_bias: unknown
      positional_encoding:
        kind: unknown
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
        - kind: story_note
          path: stories/af3-local-atom-attention/story.md
  - id: diffusion_transformer
    label: DiffusionTransformer
    kind: attention_stack
    role: global token-level diffusion core
    scale: token
    repeats: 24
    story_ref: stories/af3-diffusion-module/
    depth:
      blocks: 24
      heads: 16
    inputs:
      - token_repr
    outputs:
      - token_repr
    attention:
      pattern: full
      query_scale: token
      key_value_scale: token
      pair_bias: unknown
      positional_encoding:
        kind: unknown
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
  - id: atom_attention_decoder
    label: AtomAttentionDecoder
    kind: attention_stack
    role: write token-conditioned context back to atoms
    scale: atom
    repeats: 3
    story_ref: stories/af3-local-atom-attention/
    depth:
      blocks: 3
      heads: 4
    contains:
      - id: local_atom_attention
        label: Local atom attention
        story_ref: stories/af3-local-atom-attention/
    inputs:
      - token_repr
      - atom_features
    outputs:
      - atom_features
    attention:
      pattern: sequence_local
      query_scale: atom
      key_value_scale: atom
      query_subset_size: 32
      key_value_subset_size: 128
      window:
        kind: contiguous_sequence
        size: 128
      pair_bias: unknown
      positional_encoding:
        kind: unknown
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
        - kind: story_note
          path: stories/af3-local-atom-attention/story.md
edges:
  - from: atom_attention_encoder
    to: diffusion_transformer
    operation: atom_to_token_context
    carries:
      - token_repr
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
  - from: diffusion_transformer
    to: atom_attention_decoder
    operation: token_to_atom_context
    carries:
      - token_repr
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
claims:
  - id: af3_diffusion_has_atom_token_atom_scale_split
    statement: The AF3 diffusion module can be described as atom-local encoder, full-token transformer, atom-local decoder.
    scope:
      modules:
        - atom_attention_encoder
        - diffusion_transformer
        - atom_attention_decoder
    evidence:
      status: inferred
      refs:
        - kind: story_note
          path: stories/af3-diffusion-module/story.md
open_questions:
  - id: af3_token_pair_bias
    question: Which exact pair or conditioning streams enter the AF3 diffusion transformer attention logits?
    status: unresolved
  - id: af3_atom_positional_encoding
    question: Which exact positional or geometry encoding is used inside each AF3 atom-local attention stage?
    status: unresolved
