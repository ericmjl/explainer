      - lexeme: s_i
        symbol_ref: block_single
        access: write
      - lexeme: s
        symbol_ref: stack_single_input
        access: read
  - id: run_pair_update
    text: "z_next = PairUpdate(z_i, pair_mask)"
    comment: All five pair residual updates complete before the single track reads z_next.
    scope_ref: scopes.stack
    statement_ref: modules.pair_update_stage
    callee_scope_ref: scopes.pair_update
    operation: update_pair_track
    inputs: [block_pair, stack_pair_mask]
    outputs: [updated_pair]
    architecture_refs:
      - claims.pair_track_precedes_single_track
    source_refs:
      - source: pairformer_code
        locator: PairFormerIteration.__call__ pair updates
    code_bindings:
      - lexeme: z_next
        symbol_ref: updated_pair
        access: write
      - lexeme: PairUpdate
        architecture_ref: modules.pair_update_stage
        access: call
      - lexeme: z_i
        symbol_ref: block_pair
        access: read
      - lexeme: pair_mask
        symbol_ref: stack_pair_mask
        access: read
  - id: run_single_update
    text: "s_next = SingleUpdate(s_i, z_next, token_mask)"
    scope_ref: scopes.stack
    statement_ref: modules.single_update_stage
    callee_scope_ref: scopes.single_update
    operation: update_single_track
    inputs: [block_single, updated_pair, stack_token_mask]
    outputs: [updated_single]
    architecture_refs:
      - claims.pair_state_does_not_receive_single_update
    source_refs:
      - source: pairformer_code
        locator: PairFormerIteration.__call__ single updates
    code_bindings:
      - lexeme: s_next
        symbol_ref: updated_single
        access: write
      - lexeme: SingleUpdate
        architecture_ref: modules.single_update_stage
        access: call
      - lexeme: s_i
        symbol_ref: block_single
        access: read
      - lexeme: z_next
        symbol_ref: updated_pair
        access: read
      - lexeme: token_mask
        symbol_ref: stack_token_mask
        access: read
  - id: carry_pair_state
