schema_version: protein-standard-block-v0.1
id: per_atom_adaln_zero
name: Per-Atom AdaLN-Zero
kind: conditioning
status: draft
description: Use static atom conditioning to produce per-atom shift, scale, and gate vectors for mutable atom-state updates.
canonical_operation: per_atom_adaln_zero
input_slots:
  - id: atom_state
    label: q_l
    scale: atom
    kind: representation
    required: true
  - id: atom_conditioning
    label: c_l
    scale: atom
    kind: conditioning
    required: true
output_slots:
  - id: modulated_atom_state
    label: modulated q_l
    scale: atom
    kind: representation
math:
  - id: project_atom_conditioning
    text: "shift, scale, gate = Linear(c_l)"
    operation: conditioning_projection
    inputs: [atom_conditioning]
    outputs: [modulated_atom_state]
  - id: modulate_atom_state
    text: "q_l = q_l + gate * block(scale * LayerNorm(q_l) + shift)"
    operation: gated_residual_update
    inputs: [atom_state, atom_conditioning]
    outputs: [modulated_atom_state]
visual_template:
  type: atom_conditioning_overlay
  lanes: [atom_state, atom_conditioning]
renderer_contract:
  shows:
    - c_l as conditioning
    - q_l as mutable atom state
evidence_policy:
  require_usage_evidence: true
