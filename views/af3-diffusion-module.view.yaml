schema_version: protein-visualization-v0.1
id: af3_diffusion_module_view
title: AF3 Diffusion Module
entry:
  architecture: architectures/af3-diffusion-module.yaml
default_view: overview
views:
  - id: overview
    type: architecture_map
    layout:
      x: dataflow
      y: representation_scale
      depth: containment
    nodes:
      source: modules
    edges:
      source: edges
    hover:
      action: peek
      shows:
        - internals_summary
        - one_canonical_repeated_block
        - evidence_badge
    click:
      action: focus
  - id: atom_local_detail
    type: pseudocode_stepper
    pseudocode_ref: pseudocode/esmfold2-pair-bias-boundary.yaml
    note: Placeholder example for line-by-line source stepping.
  - id: pair_biased_attention
    type: standard_block_focus
    standard_block_ref: standard_blocks/pair-biased-attention.yaml
focus_rules:
  - target: modules.atom_attention_encoder
    on_click:
      story_ref: stories/af3-local-atom-attention/
      fallback_view: generated_yaml_inspector
  - target: modules.diffusion_transformer
    on_click:
      story_ref: stories/af3-diffusion-module/
      fallback_view: module_focus
  - target: modules.atom_attention_decoder
    on_click:
      story_ref: stories/af3-local-atom-attention/
      fallback_view: generated_yaml_inspector
interaction:
  hover:
    action: peek
    max_detail: one_canonical_block
  click:
    action: focus
    resolution_order:
      - story_ref
      - standard_block_ref
      - pseudocode_ref
      - generated_yaml_inspector
  breadcrumbs: true
protein_semantics:
  scale_lanes:
    - atom
    - token
    - token_pair
    - frame
    - coordinate
  geometry_sidecar:
    default: false
    enable_for_scene_types:
      - frame_geometry
      - 3d_rope
      - atom_coordinates
