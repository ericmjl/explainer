visual_scenes:
  - id: atom14_slotting
    type: scale_layout
    title: "Atom14 slotting: each residue token owns a fixed block of atom slots"
  - id: initializer_outputs
    type: dataflow
    title: "TokenInitializer emits atom, token, and pair streams"
  - id: atom_pair_bias_construction
    type: attention_terms
    title: "P_LL is built before atom attention, not from noisy atom distances"
  - id: token_pair_expansion
    type: scale_transition
    title: "Token pair state expands to atom-pair scale through atom_to_token"
  - id: atom_pair_pooling
    type: scale_transition
    title: "Atom pair features are also pooled back into token pairs"
  - id: diffusion_forward
    type: dataflow
    title: "Noisy coordinates enter Q_L and neighborhood construction"
  - id: sparse_neighborhood
    type: mask
    title: "Sparse local attention indices come from sequence and spatial neighborhoods"
  - id: atom_attention_pair_bias
    type: attention_terms
    title: "Atom attention adds pair bias from P_LL"
  - id: atom_to_token_downcast
    type: many_atoms_to_one_token
    title: "Atom14 slots are compressed to token state"
  - id: token_pair_update
    type: dataflow
    title: "Token pair state is updated with coordinate-derived token distograms"
  - id: token_transformer_pair_bias
    type: attention_terms
    title: "Token transformer uses Z_II as local pair bias"
  - id: atom_decoder
    type: one_token_to_many_atoms
    title: "Token state is upcast back to atom14 slots before atom decoding"
  - id: output_heads
    type: dataflow
    title: "Decoded atom state produces coordinate updates"
claims:
  - id: atom14_slots_are_real_model_inputs
    statement: RFD3 diffusion runs over dense atom14 slots, including virtual VX atoms, not only observed physical atoms.
    line_refs: [pad_atom14_slots, token_initializer_call]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: rfd3_virtual_atoms
          lines: "139-145,198-223,263-290"
  - id: atom_attention_has_pair_bias
    statement: Atom encoder and decoder attention add a projected P_LL pair bias to attention logits.
    line_refs: [atom_attention_pair_bias, decoder_atom_attention_pair_bias]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: rfd3_attention
          lines: "206,337-340,426-440"
  - id: p_ll_is_not_noisy_distance_bias
    statement: Noisy atom coordinates build Q_L and sparse neighborhoods, but P_LL itself comes from initializer atom-pair and token-pair features.
    line_refs: [build_atom_pair_repr, expand_token_pair_to_atom_pair, noisy_coords_to_atom_state, build_sparse_neighborhood]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: rfd3_encoders
          lines: "237-268"
        - kind: code
          source: rfd3_diffusion
          lines: "196-220"
  - id: token_pair_state_is_updated
    statement: Unlike the ESMFold2 token transformer slice, RFD3 has a DiffusionTokenEncoder that updates Z_II before token attention consumes it.
    line_refs: [token_encoder_with_noisy_distogram, token_pairformer_updates_z, token_attention_pair_bias]
    evidence:
      status: confirmed_from_code
      refs:
        - kind: code
          source: rfd3_encoders
          lines: "381-414"
