schema_version: protein-standard-block-v0.1
id: coordinate_injection
name: Coordinate Injection
kind: conditioning
status: draft
description: Project coordinate features into a latent atom or token state.
canonical_operation: coordinate_injection
input_slots:
  - id: latent_state
    label: latent state
    scale: atom
    kind: representation
    required: true
  - id: coordinates
    label: coordinates
    scale: coordinate
    kind: coordinate
    required: true
output_slots:
  - id: coordinate_conditioned_state
    label: coordinate-conditioned state
    scale: atom
    kind: representation
math:
  - id: project_coordinates
    text: "delta = Linear(coord_features)"
    tex: "\\Delta_i = W\\,\\phi(r_i)"
    operation: projection
    inputs: [coordinates]
    outputs: [coordinate_conditioned_state]
  - id: inject_coordinates
    text: "state = state + delta"
    tex: "h_i \\leftarrow h_i + \\Delta_i"
    operation: additive_injection
    inputs: [latent_state, coordinates]
    outputs: [coordinate_conditioned_state]
visual_template:
  type: coordinate_to_latent_injection
renderer_contract:
  shows:
    - coordinate stream entering latent state
evidence_policy:
  require_usage_evidence: true
